services:
  rag:
    build: .
    ports:
      - "11111:8000"
    volumes:
      - ./knowledge:/app/knowledge
      - ./chroma_db:/app/chroma_db
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_MODEL=qwen3.5:4b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
